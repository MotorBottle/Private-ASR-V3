services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    volumes:
      - app_runtime:/app/runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const http = require('http');
          const req = http.request({ host: '127.0.0.1', port: 3000, path: '/api/v1/health', timeout: 2000 }, (res) => process.exit(res.statusCode === 200 ? 0 : 1));
          req.on('error', () => process.exit(1));
          req.on('timeout', () => { req.destroy(); process.exit(1); });
          req.end();
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - app_runtime:/app/runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  app_runtime:
